<html lang="en">
<head>

    <title>Travi5</title>
    <link href="CSS/main.css" rel="stylesheet">
    <style type="text/css">
        
    </style>
    <script>
        var count=0;
        function changeColor()
        {
            count++;
            if(count%2==0)
            {
                document.getElementById("title0").style.color="#328b96";
                document.getElementById("pa0").style.color="#453b3b";
                document.getElementById("div0").style.backgroundColor="#a4a5c6";
                
            }
            else
            {
                document.getElementById("title0").style.color="#784d84";
                document.getElementById("pa0").style.color="#405159";
                document.getElementById("div0").style.backgroundColor="#b1a07c";
                
            }
        }
    </script>
</head>
<body>
    <div id="div0">
        <h1 id="title0">Hello</h1>
        <br>
        <p id="pa0">Travi5...</p>
        <br>
        <button onclick="changeColor()" style="background:#928787 ;">click</button>
    </div>
</body>
